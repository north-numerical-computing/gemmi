name: C++ tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v6

    - name: Install Catch2
      run: |
        git clone https://github.com/catchorg/Catch2.git
        cd Catch2
        git checkout "v3.4.0"
        mkdir build && cd build
        cmake .. -DBUILD_TESTING=Off
        make -j $(nproc)
        sudo make install

    - name: Configure for tests
      if: runner.os == 'macOS'
      run: |
        cmake -S. -Bbuild \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_MEX=False \
          -DBUILD_TESTS=True

    - name: Configure for coverage
      if: runner.os == 'Linux'
      run: |
        cmake -S. -Bbuild \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBUILD_MEX=False \
          -DBUILD_TESTS=True

    - name: Build
      run: |
        cmake --build build -j$(nproc)

    - name: Run tests
      working-directory: ./build
      run: |
        ctest --output-on-failure --verbose

    - name: Install gcovr
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcovr

    - name: Generate coverage report
      if: runner.os == 'Linux'
      run: |
        gcovr -r . \
          --xml-pretty \
          --output coverage.xml

    - name: Upload coverage report to Codecov
      uses: codecov/codecov-action@v6
      if: runner.os == 'Linux'
      with:
        files: coverage.xml
        disable_search: true
        verbose: true
      env:
           CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
